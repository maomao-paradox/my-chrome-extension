<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>设置面板</title>

  <style>
    :root {
      --el-color-primary: #409EFF;
    }

    body {
      width: 100%;
      min-height: 150px;
      margin: 0;
      padding: 0;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      overflow-x: hidden;
      overflow-y: auto;               /* 新增：允许垂直滚动 */
    }

    #app {
      padding: 12px;
      box-sizing: border-box;
      min-height: 100vh;
    }
  </style>
</head>

<body>
  <div id="app"></div>

  <script type="module" src="./options/main.js"></script>

</body>

</html>
