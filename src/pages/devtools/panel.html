<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI助手 - DevTools</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #1e1e1e;
      color: #d4d4d4;
      height: 100vh;
      overflow: hidden;
    }

    #app {
      height: 100%;
    }

    .container {
      display: flex;
      flex-direction: column;
      height: 100%;
      position: relative;
    }

    .header {
      background-color: #252526;
      padding: 12px 20px;
      border-bottom: 1px solid #3e3e42;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #ffffff;
    }

    .header .version {
      font-size: 12px;
      color: #6a6a6a;
    }

    .nav {
      background-color: #2d2d30;
      padding: 0 20px;
      border-bottom: 1px solid #3e3e42;
      display: flex;
      overflow-x: auto;
      gap: 2px;
    }

    .nav-item {
      padding: 10px 15px;
      cursor: pointer;
      font-size: 14px;
      color: #cccccc;
      border: none;
      border-bottom: 2px solid transparent;
      background: transparent;
      white-space: nowrap;
    }

    .nav-item:hover {
      background-color: #3a3a3d;
      color: #ffffff;
    }

    .nav-item.active {
      color: #0e639c;
      border-bottom-color: #0e639c;
      background-color: #252526;
    }

    .content {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .card {
      background-color: #252526;
      border: 1px solid #3e3e42;
      border-radius: 4px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .card-header {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #ffffff;
    }

    .card-body {
      font-size: 14px;
      line-height: 1.5;
    }

    .form-group {
      margin-bottom: 12px;
    }

    .form-group label {
      display: block;
      margin-bottom: 4px;
      font-size: 14px;
      color: #cccccc;
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 8px;
      background-color: #3c3c3c;
      border: 1px solid #3e3e42;
      border-radius: 4px;
      color: #d4d4d4;
      font-size: 14px;
    }

    .form-group textarea {
      resize: vertical;
      min-height: 120px;
      font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
    }

    .inline-fields {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .inline-fields > input,
    .inline-fields > select {
      flex: 1;
      min-width: 220px;
    }

    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
      margin-right: 8px;
      margin-bottom: 8px;
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn-primary {
      background-color: #0e639c;
      color: #ffffff;
    }

    .btn-primary:hover:not(:disabled) {
      background-color: #1177bb;
    }

    .btn-secondary {
      background-color: #3c3c3c;
      color: #d4d4d4;
      border: 1px solid #3e3e42;
    }

    .btn-secondary:hover:not(:disabled) {
      background-color: #4a4a4a;
    }

    .btn-danger {
      background-color: #d13438;
      color: #ffffff;
    }

    .btn-danger:hover:not(:disabled) {
      background-color: #e53e42;
    }

    .result-area {
      background-color: #1e1e1e;
      border: 1px solid #3e3e42;
      border-radius: 4px;
      padding: 10px;
      font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.5;
      overflow-y: auto;
      min-height: 200px;
      max-height: 400px;
    }

    .result-pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .result-placeholder {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #9aa0a6;
      min-height: 178px;
    }

    .info-list {
      list-style: none;
    }

    .info-list li {
      padding: 8px 0;
      border-bottom: 1px solid #3e3e42;
    }

    .info-list li:last-child {
      border-bottom: none;
    }

    .info-list .label {
      font-weight: 600;
      color: #9cdcfe;
      margin-right: 8px;
    }

    .info-list .value {
      color: #d4d4d4;
    }

    .nested-list {
      margin-top: 6px;
      margin-left: 18px;
      color: #d4d4d4;
    }

    .nested-list li {
      border-bottom: none;
      padding: 2px 0;
    }

    .loading {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #3e3e42;
      border-radius: 50%;
      border-top-color: #0e639c;
      animation: spin 1s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .history-item {
      padding: 10px;
      border: 1px solid #3e3e42;
      border-radius: 4px;
      margin-bottom: 8px;
      background-color: #252526;
    }

    .history-item.user {
      border-left: 3px solid #0e639c;
    }

    .history-item.assistant {
      border-left: 3px solid #17863a;
    }

    .history-role {
      font-size: 12px;
      color: #9cdcfe;
      margin-bottom: 6px;
      font-weight: 600;
    }

    .history-content {
      font-size: 13px;
      color: #d4d4d4;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .code-editor {
      background-color: #1e1e1e;
      border: 1px solid #3e3e42;
      border-radius: 4px;
      padding: 10px;
      font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.5;
      overflow-x: auto;
      white-space: pre-wrap;
      min-height: 150px;
      word-break: break-word;
    }

    .alert {
      padding: 10px;
      border-radius: 4px;
      margin-bottom: 12px;
      font-size: 14px;
    }

    .alert-info {
      background-color: #0e639c;
      color: #ffffff;
      border: 1px solid #1177bb;
    }

    .alert-warning {
      background-color: #d83b01;
      color: #ffffff;
      border: 1px solid #e53e42;
    }

    .alert-success {
      background-color: #137333;
      color: #ffffff;
      border: 1px solid #17863a;
    }

    .flex {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    .form-hint {
      font-size: 12px;
      color: #9aa0a6;
      margin-top: 6px;
    }

    .checkbox-label {
      display: inline-flex !important;
      align-items: center;
      gap: 8px;
      margin-bottom: 0 !important;
      cursor: pointer;
    }

    .checkbox-label input {
      width: auto;
      margin: 0;
      padding: 0;
      accent-color: #0e639c;
    }

    .notification-stack {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 999;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
    }

    .notification {
      width: 280px;
      padding: 12px 14px;
      border-radius: 6px;
      border: 1px solid #3e3e42;
      background-color: rgba(37, 37, 38, 0.95);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.28);
    }

    .notification.success {
      border-color: #17863a;
    }

    .notification.error {
      border-color: #d13438;
    }

    .notification.info {
      border-color: #0e639c;
    }

    .notification-title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 4px;
      color: #ffffff;
    }

    .notification-message {
      font-size: 12px;
      color: #d4d4d4;
      line-height: 1.5;
      word-break: break-word;
    }

    .footer {
      background-color: #252526;
      padding: 10px 20px;
      border-top: 1px solid #3e3e42;
      font-size: 12px;
      color: #6a6a6a;
      text-align: right;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="./panel.ts"></script>
</body>
</html>
