<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蒲公英动画</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="dandelion" id="dandelion">
            <div class="stem"></div>
            <div class="seeds-container">
                <div class="seed" style="--delay: 0s; --angle: 0deg;"></div>
                <div class="seed" style="--delay: 0.05s; --angle: 24deg;"></div>
                <div class="seed" style="--delay: 0.1s; --angle: 48deg;"></div>
                <div class="seed" style="--delay: 0.15s; --angle: 72deg;"></div>
                <div class="seed" style="--delay: 0.2s; --angle: 96deg;"></div>
                <div class="seed" style="--delay: 0.25s; --angle: 120deg;"></div>
                <div class="seed" style="--delay: 0.3s; --angle: 144deg;"></div>
                <div class="seed" style="--delay: 0.35s; --angle: 168deg;"></div>
                <div class="seed" style="--delay: 0.4s; --angle: 192deg;"></div>
                <div class="seed" style="--delay: 0.45s; --angle: 216deg;"></div>
                <div class="seed" style="--delay: 0.5s; --angle: 240deg;"></div>
                <div class="seed" style="--delay: 0.55s; --angle: 264deg;"></div>
                <div class="seed" style="--delay: 0.6s; --angle: 288deg;"></div>
                <div class="seed" style="--delay: 0.65s; --angle: 312deg;"></div>
                <div class="seed" style="--delay: 0.7s; --angle: 336deg;"></div>
            </div>
        </div>
        <p class="hint">👆 点击蒲公英让种子飘散</p>
    </div>
    <script src="script.js"></script>
</body>
</html>
