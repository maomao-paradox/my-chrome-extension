<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="MRIA扩展侧边栏 - 智能助手平台">
  <meta name="theme-color" content="#165DFF">
  <title>MRIA扩展 - 开发者工具</title>
  <style>
    /* CSS变量定义 - 科技感主题 */
    :root {
      /* 主色调 - 科技蓝 */
      --primary-color: #165DFF;
      --primary-light: #4080FF;
      --primary-dark: #0E42D2;

      /* 渐变色 */
      --gradient-primary: linear-gradient(135deg, #165DFF 0%, #4080FF 100%);
      --gradient-secondary: linear-gradient(135deg, #0D1117 0%, #161B22 100%);
      --gradient-card: linear-gradient(135deg, rgba(22, 93, 255, 0.05) 0%, rgba(64, 128, 255, 0.1) 100%);

      /* 背景色 */
      --bg-primary: #0D1117;
      --bg-secondary: #161B22;
      --bg-card: rgba(22, 27, 34, 0.8);
      --bg-hover: rgba(22, 93, 255, 0.1);

      /* 文本色 */
      --text-primary: #E6EDF3;
      --text-secondary: #8B949E;
      --text-tertiary: #484F58;

      /* 边框和分隔线 */
      --border-color: #30363D;
      --border-light: rgba(48, 54, 61, 0.5);

      /* 阴影 */
      --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.3);
      --shadow-md: 0 4px 8px rgba(0, 0, 0, 0.4);
      --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.5);

      /* 发光效果 */
      --glow-primary: 0 0 8px rgba(22, 93, 255, 0.5);
      --glow-secondary: 0 0 12px rgba(64, 128, 255, 0.3);

      /* 动画时间 */
      --transition-fast: 0.2s ease;
      --transition-normal: 0.3s ease;
      --transition-slow: 0.5s ease;

      /* 侧边栏宽度 */
      --sidebar-width: 320px;
    }

    /* 全局重置和基础样式 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      font-size: 14px;
    }
    
    body {
      overflow-y: auto;
    }

    /* 科技感滚动条样式 */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border-color);
      border-radius: 3px;
      transition: background var(--transition-fast);
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--primary-light);
    }

    /* 文本选择样式 */
    ::selection {
      background-color: rgba(22, 93, 255, 0.3);
      color: var(--text-primary);
    }

    /* 通用动画 */
    .fade-in {
      animation: fadeIn 0.5s ease-in-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* 按钮基础样式 */
    button {
      font-family: inherit;
      font-size: inherit;
      cursor: pointer;
      transition: all var(--transition-fast);
      border: none;
      outline: none;
    }

    /* 输入框基础样式 */
    input,
    textarea {
      font-family: inherit;
      font-size: inherit;
      background-color: var(--bg-secondary);
      color: var(--text-primary);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      padding: 8px 12px;
      outline: none;
      transition: all var(--transition-fast);
    }

    input:focus,
    textarea:focus {
      border-color: var(--primary-color);
      box-shadow: var(--glow-primary);
    }
  </style>
</head>

<body>
  <div id='app'> </div>
  <script type="module" src="./xhr.ts"> </script>
</body>

</html>
